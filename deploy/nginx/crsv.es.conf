server {
    listen 80;
    listen [::]:80;
    server_name crsv.es www.crsv.es;

    root /home/alkaline/crsves;
    index index.html;

    access_log /var/log/nginx/crsv.es.access.log;
    error_log /var/log/nginx/crsv.es.error.log;
    error_page 404 /404.html;

    # Link shortener API
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Short link redirects
    location /s/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    location = /404.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~* \.(css|js|mjs|json|xml|txt|svg|gif|ico|jpg|jpeg|png|webp|avif|glb|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crsv.es www.crsv.es;

    root /home/alkaline/crsves;
    index index.html;

    ssl_certificate /etc/nginx/ssl/crsv.es.crt;
    ssl_certificate_key /etc/nginx/ssl/crsv.es.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

