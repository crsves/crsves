server {
    listen 80;
    listen [::]:80;
    server_name r.crsv.es;

    access_log /var/log/nginx/r.crsv.es.access.log;
    error_log /var/log/nginx/r.crsv.es.error.log;

    # Proxy everything to the link shortener service
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name r.crsv.es;

    ssl_certificate /etc/nginx/ssl/r.crsv.es.crt;
    ssl_certificate_key /etc/nginx/ssl/r.crsv.es.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    access_log /var/log/nginx/r.crsv.es.access.log;
    error_log /var/log/nginx/r.crsv.es.error.log;

    # Proxy everything to the link shortener service
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }
}
