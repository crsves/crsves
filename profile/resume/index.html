<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume | crsves</title>
    <link rel="canonical" href="/profile/resume/" />
    <link rel="sitemap" href="/sitemap.xml" />
    <link href="/fonts/google-fonts.css" rel="stylesheet" />
    <link href="/fonts/local-fonts.css" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        color: #f3efe9;
        background:
          radial-gradient(circle at top left, rgba(255, 116, 83, 0.28), transparent 26%),
          radial-gradient(circle at bottom right, rgba(255, 214, 122, 0.18), transparent 28%),
          linear-gradient(180deg, #111113 0%, #060606 100%);
        font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      }
      .page {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(12px);
        background: rgba(6, 6, 6, 0.58);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .label {
        margin: 0;
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        opacity: 0.6;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.72rem 1rem;
        color: inherit;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.72rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.04);
      }
      .action:hover {
        background: #f3efe9;
        color: #080808;
      }
      .viewer {
        display: grid;
        place-items: center;
        padding: clamp(1rem, 3vw, 2rem);
      }
      .frame {
        width: min(96vw, 110rem);
        height: calc(100vh - 6.5rem);
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
      }
      .frame img {
        display: block;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      @media (max-width: 768px) {
        .header {
          align-items: flex-start;
          flex-direction: column;
        }
        .frame {
          height: calc(100vh - 8.5rem);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <p class="label">crsves / profile / resume</p>
        <div class="actions">
          <a class="action" href="/profile/">Close</a>
          <a class="action" href="/">Home</a>
        </div>
      </header>
      <main class="viewer">
        <div class="frame">
          <img src="/devin.png" alt="Resume for crsves" />
        </div>
      </main>
    </div>
  </body>
</html>
